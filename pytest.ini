[pytest]
# Only collect tests from the real test suite (not from scripts/ helpers).
testpaths = tests

# Avoid import-name collisions between `backend/` (the app package) and
# `tests/backend/` (a test folder). This makes pytest import tests by file path.
# Also explicitly ignore `scripts/` to prevent collecting helper files like `*_test.py`
# that may require optional deps (e.g. pyspark).
addopts = --import-mode=importlib -m "not integration and not e2e" --ignore=scripts

# All test output artifacts land under tmp/test-results/ (gitignored).
log_file = tmp/test-results/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_file_date_format = %Y-%m-%dT%H:%M:%S

# Keep pytest out of large / non-test directories.
norecursedirs =
  scripts
  node_modules
  frontend/node_modules
  backend/sessions
  sessions
  tmp

# Custom test markers
markers =
    fast: Fast tests (small datasets, local execution, < 5 minutes)
    slow: Slow tests (large datasets, EMR execution, > 10 minutes)
    e2e: End-to-end workflow tests (requires AWS, may be slow/expensive)
    integration: Integration tests (API endpoints, deployed backend)