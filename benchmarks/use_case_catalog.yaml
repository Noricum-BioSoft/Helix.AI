benchmark_split_policy:
  dev:
    target_source_mix:
      phylo_min_fraction: 0.30
      ngs101_min_fraction: 0.50
  validation:
    target_source_mix:
      phylo_min_fraction: 0.25
      ngs101_min_fraction: 0.50
  release_holdout:
    target_source_mix:
      phylo_min_fraction: 0.25
      ngs101_min_fraction: 0.50
    notes: "Holdout scenarios should remain unseen to implementation agents."

