schema_version: 1.0.0
generated_at_utc: "2026-04-16T00:00:00Z"
description: >
  Source-tagged benchmark use-case catalog derived from Phylo and NGS101.
  This file maps external use cases to Helix normalized capability families
  and defines starter benchmark metadata used by scenario generation/scoring.

sources:
  - id: phylo
    name: "Phylo Use Cases"
    url: "https://phylo.bio/use-cases"
  - id: ngs101
    name: "NGS101 Tutorials"
    url: "https://ngs101.com/tutorials/"

normalized_capability_families:
  - id: tabular_target_ranking
    name: "Tabular Target Ranking"
    summary: "Structured-table derivation/ranking/filtering for target prioritization."
  - id: bulk_rnaseq_de
    name: "Bulk RNA-seq Differential Expression"
    summary: "QC -> quantification -> DEG -> pathway workflows for bulk RNA-seq."
  - id: scrna_annotation
    name: "Single-Cell Annotation"
    summary: "scRNA QC/clustering/cell-type annotation workflows."
  - id: cell_cell_communication
    name: "Cell-Cell Communication"
    summary: "Inference and interpretation of intercellular signaling interactions."
  - id: variant_annotation
    name: "Variant Annotation"
    summary: "Annotate, prioritize, and interpret genomic variants."
  - id: epigenomics_peak_analysis
    name: "Epigenomics Peak Analysis"
    summary: "Peak calling, differential binding/accessibility, and motif context."
  - id: survival_biomarker_modeling
    name: "Survival and Biomarker Modeling"
    summary: "Outcome association, panel design, and predictive feature evaluation."
  - id: network_regulatory_analysis
    name: "Network/Regulatory Analysis"
    summary: "Co-expression and gene regulatory network inference/interpretation."

catalog_fields:
  required:
    - id
    - source
    - source_use_case_name
    - normalized_primary_family
    - difficulty
    - risk_class
    - input_modalities
    - expected_output_types
  enums:
    difficulty: [basic, intermediate, advanced]
    risk_class: [low, medium, high]
    input_modalities:
      - table
      - bulk_rnaseq
      - scrna
      - genomics
      - epigenomics
      - clinical
      - sequence
    expected_output_types:
      - table
      - plot
      - report
      - model
      - explanation
      - workflow_plan

use_cases:
