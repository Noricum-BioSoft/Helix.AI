    source:
      provider: bioRxiv supplemental dataset
      source_url: "TBD"
      source_use_case_id: phylo-biomarker-panel-design
    license:
      type: research_use
      citation_required: true
      redistribution_allowed: false
    contains_human_data: true
    contains_direct_identifiers: false
    sensitivity_class: restricted_human_data
    privacy_review:
      reviewer_role: Security Lead
      pii_scan: pass
      notes: "Expression matrix style table; no direct identifiers expected."
    approval_status: approved_with_restrictions
    restrictions:
      - "Use only in secured benchmark environments."
      - "No raw fixture export in CI artifacts."
      - "Only aggregate outputs in published benchmark reports."
    retention_profile: restricted_human_default

