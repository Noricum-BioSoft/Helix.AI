schema_version: 1.0.0
updated_at_utc: "2026-04-16T00:00:00Z"
description: >
  Approval registry for benchmark fixtures used by executable cases.
  Every fixture referenced by `benchmarks/cases/**/*.yaml` must have an entry.

status_enums:
  approval_status:
    - approved
    - approved_with_restrictions
    - pending
    - rejected
  sensitivity_class:
    - public
    - internal
    - restricted_human_data

fixtures:
