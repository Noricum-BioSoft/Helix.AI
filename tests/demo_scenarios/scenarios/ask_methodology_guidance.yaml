metadata:
  id: ask_methodology_guidance
  category: ask
  description: "Request for methodological guidance on experimental design"
  tags: [guru-only, experimental-design]
  requires_mock: true

input:
  user_prompt: "How do I choose the right sequencing depth for single-cell RNA-seq?"
  session_context: {}

expected_behavior:
  agent_sequence:
    - IntentDetector
    - BioinformaticsGuru
  
  intent:
    type: "ask"
    confidence_min: 0.75
  
  contracts:
    - agent: IntentDetector
      output_type: IntentResult
      validations:
        - field: intent
          equals: "ask"
        - field: confidence
          greater_than: 0.75
    
    - agent: BioinformaticsGuru
      output_type: Answer
      validations:
        - field: text
          not_empty: true
        - field: text
          min_length: 100

  policy_checks:
    - no_execution_side_effects
    - no_infrastructure_decisions
    - strict_role_separation
