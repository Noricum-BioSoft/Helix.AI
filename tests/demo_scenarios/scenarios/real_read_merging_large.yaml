metadata:
  id: real_read_merging_large
  category: execute
  description: "Real read merging on large paired-end dataset (EMR with parallelization)"
  tags: [real-execution, read-merging, large-dataset, paired-end, emr, distributed]
  author: "Demo System"
  requires_mock: false

input:
  user_prompt: "Merge my paired-end sequencing reads"
  session_context:
    uploaded_files:
      # Large dataset - structured format
      - name: "mate_R1.fq"
        uri: "s3://noricum-ngs-data/datasets/GRCh38.p12.MafHi/mate_R1.fq"
        size: "2.5GB"
        format: "fastq"
      - name: "mate_R2.fq"
        uri: "s3://noricum-ngs-data/datasets/GRCh38.p12.MafHi/mate_R2.fq"
        size: "2.5GB"
        format: "fastq"
    dataset_info:
      reference_genome: "GRCh38.p12"
      sequencing_platform: "Illumina"
      read_type: "paired_end"
      format: "fastq"
      dataset_name: "GRCh38.p12.MafHi"
    processing_params:
      quality_threshold: 30
      min_overlap: 10

expected_behavior:
  # Backend uses tool mapping mode
  agent_sequence:
    - BioinformaticsExecutor
  
  intent:
    type: "execute"
    confidence_min: 0.75
  
  contracts:
    - agent: BioinformaticsExecutor
      output_type: ToolMapping
      validations:
        - field: tool_name
          not_empty: true  # Tool name varies based on backend

  policy_checks: []
  
  min_duration_ms: 0
  max_duration_ms: 30000
